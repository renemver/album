<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>우리 가족 앨범</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가족 앨범">
<meta name="theme-color" content="#f5f0e8">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxODAgMTgwIj48cmVjdCB3aWR0aD0iMTgwIiBoZWlnaHQ9IjE4MCIgcng9IjQwIiBmaWxsPSIjZjVmMGU4Ii8+PHRleHQgeD0iOTAiIHk9IjExNSIgZm9udC1zaXplPSI5MCIgdGV4dC1hbmNob3I9Im1pZGRsZSI+8J+TtyA8L3RleHQ+PC9zdmc+">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📷</text></svg>">
<style>
  :root {
    --bg: #f5f0e8;
    --surface: #ffffff;
    --surface2: #f0ebe0;
    --border: rgba(0,0,0,0.1);
    --text: #1a1a1a;
    --text2: #6b6560;
    --accent: #c17b3f;
    --accent-light: #f5e6d3;
    --danger: #d94f4f;
    --radius: 18px;
    --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh;
  }

  /* ── 잠금 화면 ── */
  #lockScreen {
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem;
  }
  .lock-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 2.5rem 2rem; width: 100%; max-width: 360px;
    text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  }
  .lock-icon { font-size: 52px; margin-bottom: 1rem; }
  .lock-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .lock-box .sub { font-size: 15px; color: var(--text2); margin-bottom: 1.75rem; }

  .pw-input-wrap { position: relative; margin-bottom: 1rem; }
  .pw-input {
    width: 100%; padding: 16px 48px 16px 18px;
    font-size: 18px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--surface2); outline: none; color: var(--text);
    transition: border-color 0.15s; letter-spacing: 2px;
  }
  .pw-input:focus { border-color: var(--accent); }
  .pw-input.error { border-color: var(--danger); animation: shake 0.3s ease; }
  .pw-input.locked { opacity: 0.5; pointer-events: none; }
  .toggle-pw {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--text2); padding: 4px;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }
  .enter-btn {
    width: 100%; padding: 16px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm);
    font-size: 18px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .enter-btn:active { opacity: 0.85; transform: scale(0.98); }
  .enter-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .lock-msg { margin-top: 1rem; font-size: 14px; min-height: 20px; font-weight: 500; color: var(--danger); }
  .lock-msg.info { color: var(--text2); }

  /* ── 앨범 화면 ── */
  #albumScreen { display: none; padding-bottom: 3rem; }

  .header {
    background: var(--surface); text-align: center;
    padding: 2rem 1.5rem 1.25rem;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 10;
  }
  .header h1 { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 15px; color: var(--text2); margin-top: 4px; }

  .upload-wrap { padding: 1.25rem 1.25rem 0; }
  .upload-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    padding: 22px; font-size: 22px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(193,123,63,0.3);
  }
  .upload-btn:active { opacity: 0.85; transform: scale(0.98); }
  .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  #fileInput { display: none; }

  .count-bar { padding: 1rem 1.25rem 0.5rem; font-size: 16px; color: var(--text2); display: none; }
  .count-bar strong { color: var(--text); }

  .gallery {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; padding: 0.5rem 1.25rem;
  }
  @media (min-width: 700px) { .gallery { grid-template-columns: repeat(3, 1fr); } }

  .photo-card {
    border-radius: var(--radius-sm); overflow: hidden;
    background: var(--surface); box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    position: relative; cursor: pointer; transition: transform 0.15s;
  }
  .photo-card:active { transform: scale(0.97); }
  .photo-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block; }
  .photo-card .info { padding: 8px 12px 10px; }
  .photo-card .info .date { font-size: 12px; color: var(--text2); }

  .del-btn {
    position: absolute; top: 8px; right: 8px;
    width: 32px; height: 32px; border-radius: 50%;
    background: rgba(0,0,0,0.55); color: white;
    border: none; font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2; transition: background 0.15s;
  }
  .del-btn:hover { background: var(--danger); }

  .empty { grid-column: 1/-1; text-align: center; padding: 3.5rem 1rem; color: var(--text2); }
  .empty .big { font-size: 56px; margin-bottom: 0.75rem; }
  .empty p { font-size: 18px; font-weight: 600; color: var(--text); }
  .empty span { font-size: 15px; display: block; margin-top: 6px; }

  .loading-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 300;
    flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  }
  .loading-overlay.show { display: flex; }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: white; border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay p { color: white; font-size: 18px; font-weight: 600; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%);
    background: #1a1a1a; color: white;
    padding: 14px 24px; border-radius: 50px;
    font-size: 15px; font-weight: 500;
    opacity: 0; transition: opacity 0.3s;
    z-index: 400; white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; }

  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 200;
    flex-direction: column; align-items: center; justify-content: center; padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal-img { max-width: 100%; max-height: 68vh; border-radius: var(--radius-sm); object-fit: contain; display: block; }
  .modal-footer { width: 100%; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .modal-date { font-size: 15px; color: rgba(255,255,255,0.55); }
  .modal-btns { display: flex; gap: 12px; width: 100%; }
  .modal-btn {
    flex: 1; padding: 18px; border: none;
    border-radius: var(--radius-sm); font-size: 19px; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s, transform 0.1s;
  }
  .modal-btn:active { opacity: 0.8; transform: scale(0.97); }
  .btn-save { background: var(--accent); color: white; }
  .btn-close { background: rgba(255,255,255,0.15); color: white; }

  .confirm-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 500;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .confirm-bg.open { display: flex; }
  .confirm-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 2rem 1.5rem; width: 100%; max-width: 340px; text-align: center;
  }
  .confirm-box p { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .confirm-box span { font-size: 14px; color: var(--text2); }
  .confirm-btns { display: flex; gap: 10px; margin-top: 1.5rem; }
  .confirm-btn { flex: 1; padding: 16px; border: none; border-radius: var(--radius-sm); font-size: 17px; font-weight: 700; cursor: pointer; }
  .confirm-cancel { background: var(--surface2); color: var(--text); }
  .confirm-delete { background: var(--danger); color: white; }

  /* 업로드 확인 모달 */
  .upload-confirm-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 600;
    align-items: center; justify-content: center; padding: 1.5rem;
  }
  .upload-confirm-bg.open { display: flex; }
  .upload-confirm-box {
    background: var(--surface); border-radius: var(--radius);
    padding: 2rem 1.5rem; width: 100%; max-width: 360px; text-align: center;
  }
  .upload-confirm-box .uc-icon { font-size: 40px; margin-bottom: 0.75rem; }
  .upload-confirm-box p { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .upload-confirm-box span { font-size: 14px; color: var(--text2); display: block; margin-bottom: 1.5rem; }
  .upload-preview {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 1.5rem; max-height: 160px; overflow-y: auto;
  }
  .upload-preview img {
    width: 72px; height: 72px; object-fit: cover;
    border-radius: var(--radius-sm); border: 1.5px solid var(--border);
  }
</style>
</head>
<body>

<!-- ── 잠금 화면 ── -->
<div id="lockScreen">
  <div class="lock-box">
    <div class="lock-icon">🔒</div>
    <h2>우리 가족 앨범</h2>
    <p class="sub">비밀번호를 입력해주세요</p>
    <div class="pw-input-wrap">
      <input class="pw-input" id="pwInput" type="password"
        placeholder="비밀번호" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') tryLogin()">
      <button class="toggle-pw" onclick="togglePw()" tabindex="-1" id="toggleBtn">👁</button>
    </div>
    <button class="enter-btn" id="enterBtn" onclick="tryLogin()">확인</button>
    <div class="lock-msg" id="lockMsg"></div>
  </div>
</div>

<!-- ── 앨범 화면 ── -->
<div id="albumScreen">
  <div class="header">
    <h1>📷 우리 가족 앨범</h1>
    <p>소중한 순간을 함께 간직해요</p>
  </div>

  <div class="upload-wrap">
    <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()">
      <span>＋</span> 사진 올리기
    </button>
    <input type="file" id="fileInput" multiple accept="image/*" onchange="handleUpload(event)">
  </div>

  <div class="count-bar" id="countBar">사진 <strong id="totalCount">0</strong>장</div>
  <div class="gallery" id="gallery">
    <div class="empty">
      <div class="big">🏡</div>
      <p>아직 사진이 없어요</p>
      <span>위 버튼을 눌러 사진을 올려주세요</span>
    </div>
  </div>
</div>

<!-- 크게 보기 -->
<div class="modal-bg" id="modalBg">
  <img class="modal-img" id="modalImg" src="" alt="">
  <div class="modal-footer">
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-btns">
      <button class="modal-btn btn-save" id="saveBtn">⬇ 저장하기</button>
      <button class="modal-btn btn-close" onclick="closeModal()">✕ 닫기</button>
    </div>
  </div>
</div>

<!-- 삭제 확인 -->
<div class="confirm-bg" id="confirmBg">
  <div class="confirm-box">
    <p>사진을 삭제할까요?</p>
    <span>삭제하면 복구할 수 없어요</span>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-cancel" onclick="closeConfirm()">취소</button>
      <button class="confirm-btn confirm-delete" id="confirmDelBtn">삭제</button>
    </div>
  </div>
</div>

<!-- 업로드 확인 모달 -->
<div class="upload-confirm-bg" id="uploadConfirmBg">
  <div class="upload-confirm-box">
    <div class="uc-icon">📸</div>
    <p id="uploadConfirmTitle">사진을 올릴까요?</p>
    <span id="uploadConfirmSub"></span>
    <div class="upload-preview" id="uploadPreview"></div>
    <div class="confirm-btns">
      <button class="confirm-btn confirm-cancel" onclick="cancelUpload()">취소</button>
      <button class="confirm-btn btn-save" id="uploadConfirmBtn" style="background:var(--accent);color:white;" onclick="doUpload()">올리기</button>
    </div>
  </div>
</div>

<!-- 로딩 -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingMsg">불러오는 중...</p>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ────────────────────────────────────────────────────
const PW_HASH = 'd74fe97872d8a425b5263add13d51a1066bf0b2cdd5e368d316dfe31048b2104';
const SESSION_KEY = 'fam_auth';
const FAIL_KEY = 'fam_fails';
const LOCK_KEY = 'fam_lockuntil';
const MAX_FAILS = 5;
const LOCK_MINUTES = 10;

// ── 잠금 / 인증 ──────────────────────────────────────────────

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function getFailCount() { return parseInt(localStorage.getItem(FAIL_KEY) || '0'); }
function setFailCount(n) { localStorage.setItem(FAIL_KEY, String(n)); }
function getLockUntil() { return parseInt(localStorage.getItem(LOCK_KEY) || '0'); }
function setLockUntil(ts) { localStorage.setItem(LOCK_KEY, String(ts)); }
function getRemainingLock() {
  const remaining = getLockUntil() - Date.now();
  return remaining > 0 ? Math.ceil(remaining / 1000) : 0;
}
function setLockUI(locked, msg, isInfo) {
  document.getElementById('pwInput').classList.toggle('locked', locked);
  document.getElementById('enterBtn').disabled = locked;
  const el = document.getElementById('lockMsg');
  el.textContent = msg;
  el.className = 'lock-msg' + (isInfo ? ' info' : '');
}

let lockTimer = null;
function startLockCountdown() {
  if (lockTimer) clearInterval(lockTimer);
  lockTimer = setInterval(() => {
    const sec = getRemainingLock();
    if (sec <= 0) {
      clearInterval(lockTimer);
      setFailCount(0);
      setLockUI(false, '', false);
    } else {
      const min = Math.floor(sec / 60);
      const s = sec % 60;
      setLockUI(true, `${min > 0 ? min + '분 ' : ''}${s}초 후에 다시 시도해주세요`, true);
    }
  }, 1000);
}

async function tryLogin() {
  if (getRemainingLock() > 0) return;
  const val = document.getElementById('pwInput').value;
  if (!val) return;

  const hash = await sha256(val);
  if (hash === PW_HASH) {
    setFailCount(0); setLockUntil(0);
    sessionStorage.setItem(SESSION_KEY, '1');
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('albumScreen').style.display = 'block';
    loadPhotos();
  } else {
    const fails = getFailCount() + 1;
    setFailCount(fails);
    const input = document.getElementById('pwInput');
    input.classList.add('error');
    setTimeout(() => input.classList.remove('error'), 400);
    input.value = '';

    if (fails >= MAX_FAILS) {
      setLockUntil(Date.now() + LOCK_MINUTES * 60 * 1000);
      startLockCountdown();
    } else {
      setLockUI(false, `비밀번호가 틀렸어요 (${MAX_FAILS - fails}번 더 틀리면 ${LOCK_MINUTES}분 잠금)`, false);
    }
  }
}

function togglePw() {
  const input = document.getElementById('pwInput');
  const btn = document.getElementById('toggleBtn');
  input.type = input.type === 'password' ? 'text' : 'password';
  btn.textContent = input.type === 'password' ? '👁' : '🙈';
}

// 페이지 로드 시 인증 상태 확인
if (sessionStorage.getItem(SESSION_KEY) === '1') {
  document.getElementById('lockScreen').style.display = 'none';
  document.getElementById('albumScreen').style.display = 'block';
} else if (getRemainingLock() > 0) {
  startLockCountdown();
}

// ── API 호출 (서버 경유) ──────────────────────────────────────

let photos = [];
let pendingDeleteId = null;

async function loadPhotos() {
  showLoading('사진 불러오는 중...');
  try {
    const res = await fetch('/api/photos');
    const data = await res.json();
    photos = data.photos || [];
  } catch {
    showToast('사진을 불러오지 못했어요');
    photos = [];
  }
  hideLoading();
  render();
}

let pendingFiles = [];

function handleUpload(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  pendingFiles = files;
  e.target.value = '';

  // 미리보기 생성
  const preview = document.getElementById('uploadPreview');
  preview.innerHTML = '';
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = document.createElement('img');
      img.src = ev.target.result;
      preview.appendChild(img);
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('uploadConfirmTitle').textContent = `사진 ${files.length}장을 올릴까요?`;
  document.getElementById('uploadConfirmSub').textContent = `선택한 사진을 가족 앨범에 올려요`;
  document.getElementById('uploadConfirmBg').classList.add('open');
}

function cancelUpload() {
  pendingFiles = [];
  document.getElementById('uploadConfirmBg').classList.remove('open');
  document.getElementById('uploadPreview').innerHTML = '';
}

async function doUpload() {
  if (!pendingFiles.length) return;
  document.getElementById('uploadConfirmBg').classList.remove('open');
  showLoading(`${pendingFiles.length}장 업로드 중...`);
  setUploadDisabled(true);

  const fd = new FormData();
  pendingFiles.forEach(f => fd.append('files', f));
  pendingFiles = [];

  try {
    const res = await fetch('/api/photos/upload', { method: 'POST', body: fd });
    const data = await res.json();
    showToast(`${data.uploaded}장 업로드 완료!`);
    setLoadingMsg('사진 목록 업데이트 중...');
    await new Promise(r => setTimeout(r, 1500));
    await loadPhotos();
  } catch {
    showToast('업로드에 실패했어요');
  }
  hideLoading();
  setUploadDisabled(false);
}

// ── 렌더링 ───────────────────────────────────────────────────

function render() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  const countBar = document.getElementById('countBar');
  countBar.style.display = photos.length ? '' : 'none';
  document.getElementById('totalCount').textContent = photos.length;

  if (!photos.length) {
    gallery.innerHTML = `<div class="empty"><div class="big">🏡</div><p>아직 사진이 없어요</p><span>위 버튼을 눌러 사진을 올려주세요</span></div>`;
    return;
  }
  photos.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'photo-card';

    const img = document.createElement('img');
    img.src = p.thumb; img.alt = '가족 사진'; img.loading = 'lazy';
    img.onclick = () => openModal(i);

    const delBtn = document.createElement('button');
    delBtn.className = 'del-btn'; delBtn.textContent = '✕';
    delBtn.onclick = ev => { ev.stopPropagation(); askDelete(p.public_id); };

    const info = document.createElement('div');
    info.className = 'info';
    info.innerHTML = `<div class="date">${formatDate(new Date(p.created_at))}</div>`;

    card.appendChild(img); card.appendChild(delBtn); card.appendChild(info);
    gallery.appendChild(card);
  });
}

// ── 모달 ─────────────────────────────────────────────────────

function openModal(i) {
  const p = photos[i];
  document.getElementById('modalImg').src = p.url;
  document.getElementById('modalDate').textContent = formatDate(new Date(p.created_at));
  document.getElementById('saveBtn').onclick = () => window.open(p.url, '_blank');
  document.getElementById('modalBg').classList.add('open');
}
function closeModal() { document.getElementById('modalBg').classList.remove('open'); }
document.getElementById('modalBg').addEventListener('click', e => {
  if (e.target === document.getElementById('modalBg')) closeModal();
});

// ── 삭제 ─────────────────────────────────────────────────────

function askDelete(publicId) {
  pendingDeleteId = publicId;
  document.getElementById('confirmBg').classList.add('open');
}
function closeConfirm() {
  pendingDeleteId = null;
  document.getElementById('confirmBg').classList.remove('open');
}
document.getElementById('confirmDelBtn').onclick = async () => {
  if (!pendingDeleteId) return;
  try {
    await fetch(`/api/photos/${encodeURIComponent(pendingDeleteId)}`, { method: 'DELETE' });
    photos = photos.filter(p => p.public_id !== pendingDeleteId);
    showToast('삭제했어요');
  } catch {
    showToast('삭제에 실패했어요');
  }
  pendingDeleteId = null;
  closeConfirm();
  render();
};

// ── 유틸 ─────────────────────────────────────────────────────

function formatDate(d) {
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
}
function showLoading(msg) {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingOverlay').classList.add('show');
}
function setLoadingMsg(msg) { document.getElementById('loadingMsg').textContent = msg; }
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }
function setUploadDisabled(v) { document.getElementById('uploadBtn').disabled = v; }

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

if (sessionStorage.getItem(SESSION_KEY) === '1') loadPhotos();
